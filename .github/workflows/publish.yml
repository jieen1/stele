name: publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag to publish"
        required: true
        default: "latest"
      dry_run:
        description: "Run publish dry-run only"
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile
      - run: python -m pip install pytest
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:packed-adoption

      - name: Publish dry-run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: pnpm release:dry-run -- --tag "${{ inputs.tag }}"

      - name: Publish packages
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            pnpm release:publish -- --tag latest --require-git-tag-version
          else
            pnpm release:publish -- --tag "${{ inputs.tag }}"
          fi
