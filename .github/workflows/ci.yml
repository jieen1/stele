name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile
      - run: python -m pip install pytest
      - run: pnpm test
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:packed-adoption
      - run: node ../../packages/cli/dist/index.js generate
        working-directory: fixtures/python-app
      - run: python -m pytest tests/contract -q
        working-directory: fixtures/python-app
      - run: node ../../packages/cli/dist/index.js check
        working-directory: fixtures/python-app
