name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile
      - run: python -m pip install pytest

      # Round 3 P1-1: self-protection runs BEFORE the bulk pnpm test fan-out.
      # ALL_EVALUATORS_COMPILE inspects every evaluator's dist/, which means
      # we need `pnpm build` to have succeeded; once it has, the pytest check
      # validates the actual self-protection contract before any later step
      # has a chance to mask a missing-dist failure behind TS7016 / import
      # errors. Original ordering put `pnpm test` first, so a deleted dist
      # in a downstream package would surface as a vitest import error and
      # the agent fixing it might never see the precise self-protection
      # violation.
      - run: pnpm build
      - run: python -m pytest tests/contract -q
      - run: node packages/cli/dist/index.js check

      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test:packed-adoption
      # Adoption smoke: a clean checkout of fixtures/python-app must generate,
      # pytest, and check successfully.
      - run: node ../../packages/cli/dist/index.js generate
        working-directory: fixtures/python-app
      - run: python -m pytest tests/contract -q
        working-directory: fixtures/python-app
      - run: node ../../packages/cli/dist/index.js check
        working-directory: fixtures/python-app
