[tool.pytest.ini_options]
# Round 15 HIGH finding: a `return` statement inside a pytest test function
# is silently ignored — the test is recorded as PASSED no matter what value
# it returns. Promote that warning to an error so any future test that uses
# `return True/False` instead of `assert ...` fails loudly.
filterwarnings = [
    "error::pytest.PytestReturnNotNoneWarning",
]
# Round 16 LOW finding: bare `pytest` from the repo root tried to discover
# both `tests/contract/conftest.py` and `fixtures/python-app/tests/contract/conftest.py`
# under the same module name `contract.conftest`, causing a collection-time
# ModuleNotFoundError. Pin the two real test trees so bare `pytest` from
# the repo root works for developers and CI.
testpaths = [
    "tests/contract",
    "contract/checker_impls",
]
